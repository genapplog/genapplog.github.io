            </div>

            <div class="flex flex-col relative">
                <label class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Estados (UF)</label>
                <button type="button" id="btn-dropdown-uf" class="bg-slate-900 border border-slate-600 text-white text-xs p-2 rounded-lg w-32 text-left flex justify-between items-center outline-none focus:border-indigo-500 transition-all">

                    <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>

                        <button type="button" id="btn-uf-limpar" class="text-[10px] text-red-400 hover:text-white font-bold uppercase transition-colors">Limpar</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 max-h-48 overflow-y-auto pr-2 custom-scroll" id="container-checkbox-uf">
                        </div>
                </div>
            </div>

            <div class="flex gap-2 ml-auto">
                <label title="Carregar Planilha Bruta" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-bold transition text-xs flex items-center gap-2 cursor-pointer shadow-lg shadow-indigo-900/20 h-[38px]">

                    UPLOAD

                </label>

                <button id="btn-salvar-capa" title="Salvar dados digitados na capa" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold transition text-xs flex items-center gap-2 shadow-lg h-[38px]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    SALVAR
                </button>

                <button id="btn-exportar-filtrado" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-lg font-bold transition text-xs flex items-center gap-2 shadow-lg h-[38px]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    EXPORTAR
                </button>

                <button id="btn-imprimir-capa" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold transition text-xs flex items-center gap-2 shadow-lg h-[38px]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>

    <div id="capa-print-area" class="bg-white text-black p-8 rounded-xl shadow-2xl mx-auto print:shadow-none print:p-0 print:m-0 print:w-full max-w-5xl border border-slate-700 print:border-none mb-10">
        
        <div class="border-b-4 border-black pb-4 mb-6 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-black uppercase tracking-tighter">Capa de Agendamento</h2>
                <p class="text-sm font-bold text-gray-700 mt-1">SISTEMA APPLOG - CONSOLIDAÇÃO DE CARGA</p>
            </div>
            
            
            <div class="hidden print:flex flex-col items-center">

            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 text-sm font-bold uppercase">
            <div class="border-2 border-black p-3 bg-gray-100 col-span-2 md:col-span-1">
                <label class="text-[10px] text-gray-500 block mb-1">Nome Fornecedor</label>
                <select id="capa-fornecedor" class="w-full bg-transparent border-none p-0 text-xl font-black outline-none appearance-none cursor-pointer">
                    <option value="GENOMMA LABORATORIES DO BRASIL LTDA">GENOMMA LABORATORIES DO BRASIL LTDA</option>
                    <option value="INOVALAB DO BRASIL LTDA">INOVALAB DO BRASIL LTDA</option>
                </select>
            </div>
            <div class="border-2 border-black p-3 bg-gray-100 col-span-2 md:col-span-1">
                <label class="text-[10px] text-gray-500 block mb-1">Transportadora</label>
                <input type="text" id="capa-transportadora" class="w-full bg-transparent border-none p-0 text-xl font-black outline-none uppercase" placeholder="-">
            </div>

            <div class="border-2 border-black p-3 col-span-2 md:col-span-1">
                <label class="text-[10px] text-gray-500 block mb-1">Notas Fiscais</label>
                <textarea id="capa-nf" class="w-full bg-transparent border-none p-0 text-base font-bold outline-none uppercase resize-none leading-tight" rows="3" placeholder="Somas das NFs detectadas..."></textarea>
            </div>
            <div class="border-2 border-black p-3 col-span-2 md:col-span-1">
                <label class="text-[10px] text-gray-500 block mb-1">Nº Pedidos</label>
                <textarea id="capa-pedido" class="w-full bg-transparent border-none p-0 text-base font-bold outline-none uppercase resize-none leading-tight" rows="3" placeholder="Somas dos pedidos detectados..."></textarea>
            </div>

            <div class="border-2 border-black p-3">
                <label class="text-[10px] text-gray-500 block mb-1">CD</label>
                <input type="text" id="capa-cd" class="w-full bg-transparent border-none p-0 text-base font-black outline-none uppercase" placeholder="-">
            </div>
            <div class="border-2 border-black p-3">
                <label class="text-[10px] text-gray-500 block mb-1">Tipo de Agendamento</label>
                <input type="text" id="capa-tipo" class="w-full bg-transparent border-none p-0 text-base font-black outline-none uppercase" placeholder="-">
            </div>

            <div class="border-2 border-black p-3">
                <label class="text-[10px] text-gray-500 block mb-1">Data Agenda</label>
                <input type="text" id="capa-data" class="w-full bg-transparent border-none p-0 text-base font-black outline-none uppercase" placeholder="00/00/0000">
            </div>
            <div class="border-2 border-black p-3">
                <label class="text-[10px] text-gray-500 block mb-1">Romaneio</label>
                <input type="text" id="capa-remessa" class="w-full bg-transparent border-none p-0 text-base font-black outline-none uppercase" placeholder="-">
            </div>

            <div class="border-2 border-black p-3">
                <label class="text-[10px] text-gray-500 block mb-1">Qtd Volumes</label>
                <input type="text" id="capa-volume" class="w-full bg-transparent border-none p-0 text-base font-black outline-none" placeholder="0">
            </div>
            <div class="border-2 border-black p-3 grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[10px] text-gray-500 block mb-1">Peso Total (KG)</label>
                    <input type="text" id="capa-peso" class="w-full bg-transparent border-none p-0 text-base font-black outline-none" placeholder="0.00">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 block mb-1">Qtd Pallets</label>
                    <input type="text" id="capa-palet" class="w-full bg-transparent border-none p-0 text-base font-black outline-none" placeholder="0">
                </div>
            </div>

            <div class="border-2 border-black p-4 bg-gray-200 col-span-2 flex justify-between items-center">
                <span class="text-sm font-black text-gray-700 block uppercase tracking-widest">Valor Total Consolidado (NF):</span>
                <input type="text" id="capa-valor" class="bg-transparent border-none p-0 text-3xl font-black outline-none text-right w-full" placeholder="R$ 0,00">
            </div>
        </div>
        
        <div class="mt-8 pt-4 border-t border-dashed border-gray-400 text-center text-[10px] text-gray-400 font-bold uppercase tracking-widest">
            Documento consolidado via AppLog Agendamento • Impresso em: <span id="span-data-impressao">--/--/----</span>
        </div>
    </div>
</div>

<style>
    /* Estilo para garantir visualização correta no Navegador */
    #capa-nf, #capa-pedido {
        scrollbar-width: none;
    }
    #capa-nf::-webkit-scrollbar, #capa-pedido::-webkit-scrollbar {
        display: none;
    }
    /* Estilo para o dropdown de UFs */
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

    @media print {
        @page { size: A4 landscape; margin: 10mm; }
        body { background: white !important; }
        .page-content { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
        
        /* Oculta tudo exceto a área da capa */
        body * { visibility: hidden; }
        #capa-print-area, #capa-print-area * { visibility: visible; }
        #capa-print-area { 
            position: absolute; 
            left: 0; 
            top: 0; 
            width: 100%; 
            border: none !important;
            padding: 0 !important;
        }

        /* Força as cores de fundo na impressão */
        .bg-gray-100 { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; }
        .bg-gray-200 { background-color: #e5e7eb !important; -webkit-print-color-adjust: exact; }
    }
</style>
